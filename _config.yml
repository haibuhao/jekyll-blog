title: My Blog
description: My GitHub Pages Blog
author: Author Name
email: author@example.com

# Build settings
markdown: kramdown
theme: minima
highlighter: rouge

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Social links
twitter_username: ""
github_username:  ""

# Footer links
footer_links:
  - github
  - twitter
